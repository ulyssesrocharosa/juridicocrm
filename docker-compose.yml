version: '3.8'

services:
  # ============================================================
  #  JurisCRM Backend (API)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: juridico-crm-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - DATAJUD_API_KEY=${DATAJUD_API_KEY}
      - DATAJUD_BASE_URL=https://api-publica.datajud.cnj.jus.br
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=juridico-crm
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - BASE_URL=${BASE_URL:-http://localhost:3001}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_EMAIL=${VAPID_EMAIL:-mailto:admin@escritorio.com}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    networks:
      - juridico-net
    depends_on:
      - evolution

  # ============================================================
  #  JurisCRM Frontend
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: juridico-crm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - juridico-net

  # ============================================================
  #  Evolution API (WhatsApp)
  # ============================================================
  evolution:
    image: atendai/evolution-api:latest
    container_name: juridico-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - CORS_ORIGIN=*
      - CORS_CREDENTIALS=true
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=mongodb://mongodb:27017/evolution
      - DATABASE_CONNECTION_DB_PREFIX_NAME=evolution
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - juridico-net
    depends_on:
      - mongodb

  # ============================================================
  #  MongoDB (para Evolution API)
  # ============================================================
  mongodb:
    image: mongo:6
    container_name: juridico-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - juridico-net

networks:
  juridico-net:
    driver: bridge

volumes:
  evolution_data:
  mongodb_data:
